plugins {
    id "com.android.application"
}

if (file("google-services.json").exists()) {
    apply plugin: "com.google.gms.google-services"
}

android {
    namespace "com.aiusagedashboard.widget"
    compileSdk 35

    defaultConfig {
        applicationId "com.aiusagedashboard.widget"
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "0.1.0"
    }
}

dependencies {
    implementation "androidx.work:work-runtime:2.9.1"
    implementation "com.google.firebase:firebase-messaging:24.1.2"
}

tasks.register("syncProviderRegistry", Copy) {
    from file("../../../packages/core/src/domain/provider-registry.json")
    into layout.projectDirectory.dir("src/main/res/raw")
    rename { "provider_registry.json" }
}

preBuild.dependsOn("syncProviderRegistry")
